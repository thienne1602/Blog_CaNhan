<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio của Thạch Văn Ngọc Thiên — Business Analyst Intern, trình bày theo dạng slide ngang tự động."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#090b16" />
    <meta name="author" content="Thạch Văn Ngọc Thiên" />
    <meta property="og:locale" content="vi_VN" />
    <meta property="og:title" content="Portfolio — Thạch Văn Ngọc Thiên" />
    <meta
      property="og:description"
      content="Business Analyst Intern · HUTECH — Bản trình bày ngang tự động, head dọc và điều hướng nhanh."
    />
    <meta property="og:image" content="assets/images/cv-preview.png" />
    <meta property="og:type" content="website" />
    <title>Portfolio — Thạch Văn Ngọc Thiên</title>

    <link rel="icon" type="image/png" href="assets/images/cv-preview.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0"
    />

    <link rel="stylesheet" href="css/portfolio.css" />
  </head>

  <body>
    <div class="video-bg" aria-hidden="true">
      <video autoplay muted loop playsinline>
        <source src="assets/backround/Nen_Trang_Web.mp4" type="video/mp4" />
        <track
          kind="captions"
          srclang="vi"
          label="Nền video"
          src="data:text/vtt;charset=utf-8,WEBVTT"
          default
        />
      </video>
      <div class="video-overlay"></div>
    </div>

    <a href="#mainContent" class="skip-link" data-i18n="skip_link"
      >Bỏ qua điều hướng, tới nội dung chính</a
    >
    <div class="noise" aria-hidden="true"></div>

    <audio
      id="bgMusic"
      src="assets/audio/8. Tìm Lại Hạnh Phúc Từ Tuổi Thơ.mp3"
      autoplay
      loop
      preload="auto"
    ></audio>

    <audio
      id="clickSound"
      src="assets/audio/rawambience-user-interface-click-234656.mp3"
      preload="auto"
    ></audio>

    <button
      id="musicToggle"
      class="music-toggle"
      aria-label="Tắt/Mở nhạc"
      title="Tắt/Mở nhạc"
    >
      <span class="material-symbols-outlined" id="musicIcon">music_note</span>
    </button>

    <style>
      .music-toggle {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        color: #fff;
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .music-toggle:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.05);
      }
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const audio = document.getElementById("bgMusic");
        const clickSound = document.getElementById("clickSound");
        const toggleBtn = document.getElementById("musicToggle");
        const musicIcon = document.getElementById("musicIcon");
        let isPlaying = false;

        // Phát âm thanh báo khi click bất kỳ đâu trên trang
        document.addEventListener("click", () => {
          clickSound.currentTime = 0; // Đặt lại thời gian để có thể phát liên tục nếu click nhanh
          clickSound
            .play()
            .catch((err) => console.warn("Click sound blocked:", err));
        });

        const playMusic = () => {
          if (isPlaying) return;
          audio
            .play()
            .then(() => {
              isPlaying = true;
              musicIcon.textContent = "music_note";
            })
            .catch((err) =>
              console.warn("Audio play blocked by browser:", err),
            );
          document.removeEventListener("click", playMusic);
          document.removeEventListener("keydown", playMusic);
        };

        document.addEventListener("click", playMusic);
        document.addEventListener("keydown", playMusic);

        toggleBtn.addEventListener("click", (e) => {
          e.stopPropagation(); // Avoid triggering the document click
          if (audio.paused) {
            audio.play();
            isPlaying = true;
            musicIcon.textContent = "music_note";
          } else {
            audio.pause();
            isPlaying = false;
            musicIcon.textContent = "music_off";
          }
        });
      });
    </script>

    <style>
      /* Swappable project & detail panels */
      .project-feature-area {
        position: relative;
      }

      .project-feature[data-project] {
        animation: featureFadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      @keyframes featureFadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Swappable item in list */
      .project-item--swappable {
        cursor: pointer;
        border-left: 3px solid transparent;
        background-image: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(247,147,30,0.05));
        transition: all 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .project-item--swappable:hover {
        border-left-color: #ff6b35;
        background-image: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(247,147,30,0.08));
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(255, 107, 53, 0.2);
      }

      .project-item-tags {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .project-item-play {
        color: #ff6b35;
        font-size: 1.3rem !important;
        font-variation-settings: 'FILL' 1, 'wght' 500;
        animation: playPulse 2s ease-in-out infinite;
      }

      @keyframes playPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(0.9); }
      }

      .project-item-hint {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.72rem;
        font-weight: 600;
        color: rgba(255, 107, 53, 0.8);
        margin-top: 0.2rem;
      }

      .project-item-hint .material-symbols-outlined {
        font-size: 0.9rem;
      }

      /* Detail panel */
      .project-item--detail {
        cursor: pointer;
        transition: all 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .project-item--detail:hover {
        transform: translateY(-2px);
      }

      .project-item-arrow {
        font-size: 1.3rem !important;
        color: var(--text-2, rgba(255,255,255,0.6));
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .project-item--detail.is-open .project-item-arrow {
        transform: rotate(180deg);
        color: var(--accent-1, #8b7bff);
      }

      .project-detail-panel {
        display: none;
        margin-top: 0.6rem;
        padding-top: 0.6rem;
        border-top: 1px solid rgba(255,255,255,0.1);
        animation: detailSlideIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .project-item--detail.is-open .project-detail-panel {
        display: block;
      }

      @keyframes detailSlideIn {
        from { opacity: 0; transform: translateY(-6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .project-detail-grid {
        display: grid;
        gap: 0.45rem;
        margin-bottom: 0.6rem;
      }

      .project-detail-item {
        display: flex;
        gap: 0.5rem;
        align-items: baseline;
      }

      .project-detail-label {
        font-size: 0.72rem;
        font-weight: 800;
        color: var(--accent-1, #8b7bff);
        text-transform: uppercase;
        letter-spacing: 0.04rem;
        white-space: nowrap;
        min-width: 5.5rem;
      }

      .project-detail-value {
        font-size: 0.82rem;
        color: var(--text-2, rgba(255,255,255,0.7));
        line-height: 1.4;
      }

      .project-detail-panel .btn {
        margin-top: 0.3rem;
      }
    </style>

    <script>
      function swapToProject(projectId) {
        // Get all featured views
        const features = document.querySelectorAll('.project-feature[data-project]');
        const listItems = document.querySelectorAll('.project-item--swappable[data-list-project]');

        features.forEach(f => {
          const isTarget = f.dataset.project === projectId;
          f.style.display = isTarget ? '' : 'none';

          // Handle iframe lazy loading for NQSH
          if (isTarget && projectId === 'nqsh') {
            const iframe = f.querySelector('iframe[data-src]');
            if (iframe && !iframe.src.includes('youtube')) {
              iframe.src = iframe.dataset.src;
            }
          }

          // Stop NQSH video when hiding (VieGo keeps playing muted in background)
          if (!isTarget && f.dataset.project === 'nqsh') {
            const iframe = f.querySelector('iframe');
            if (iframe) iframe.src = '';
          }

          // Re-trigger animation
          if (isTarget) {
            f.style.animation = 'none';
            f.offsetHeight; // force reflow
            f.style.animation = '';
          }
        });

        // Toggle visibility directly in project list: 
        // the active project is hidden from the list, while others resurface
        listItems.forEach(item => {
          if (item.dataset.listProject === projectId) {
            item.style.display = 'none';
          } else {
            item.style.display = '';
          }
        });
      }

      function toggleDetail(el) {
        // Close others first
        document.querySelectorAll('.project-item--detail.is-open').forEach(item => {
          if (item !== el) item.classList.remove('is-open');
        });
        el.classList.toggle('is-open');
      }
    </script>

    <div id="mainLayoutHost"></div>

    <script src="js/load-layout.js" defer></script>
  </body>
</html>
