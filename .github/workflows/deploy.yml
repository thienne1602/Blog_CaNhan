name: Deploy Next.js SSG to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # ensure any nested submodules or nested repos are fetched
          submodules: "recursive"
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Show repo layout (debug)
        run: |
          echo "PWD: $(pwd)"
          echo "List root files:"; ls -la

      - name: Ensure public images
        run: |
          # If images exist in personal-blog/public, copy them into root public so Next export includes them
          if [ -d personal-blog/public/images ]; then
            mkdir -p public/images
            cp -r personal-blog/public/images/* public/images/ || true
            echo "Copied personal-blog images to root public/images"
          else
            echo "No personal-blog/public/images found"
          fi

      - name: Install & build (repo root)
        env:
          NEXT_PUBLIC_BASE_PATH: "/Blog_CaNhan"
        run: |
          echo "Now in: $(pwd)";
          npm ci
          npm run build

      - name: Ensure images in output
        run: |
          echo "Listing out/ before copy:"; ls -la out || true
          # copy public images into root out/images so requests to /images/ succeed
          if [ -d public/images ]; then
            mkdir -p out/images
            cp -r public/images/* out/images/ || true
            echo "Copied public/images to out/images"
          fi
          # also copy into basePath subfolder so requests to /Blog_CaNhan/images/ succeed
          if [ -d public/images ]; then
            mkdir -p out/Blog_CaNhan/images
            cp -r public/images/* out/Blog_CaNhan/images/ || true
            echo "Copied public/images to out/Blog_CaNhan/images"
          fi

      - name: Rewrite absolute image paths in HTML to include basePath
        run: |
          # Replace occurrences of "/images/" in generated HTML with "/Blog_CaNhan/images/"
          if [ -d out ]; then
            echo "Rewriting /images/ -> /Blog_CaNhan/images/ in HTML files"
            find out -type f -name '*.html' -print0 | xargs -0 sed -i 's|/images/|/Blog_CaNhan/images/|g' || true
            # also rewrite any absolute site URLs
            find out -type f -name '*.html' -print0 | xargs -0 sed -i 's|https://thienne1602.github.io/images/|/Blog_CaNhan/images/|g' || true
          else
            echo "out directory not found"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
