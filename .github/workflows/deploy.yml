name: Deploy Next.js SSG to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # ensure any nested submodules or nested repos are fetched
          submodules: "recursive"
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Show repo layout (debug)
        run: |
          echo "PWD: $(pwd)"
          echo "List root files:"; ls -la

      - name: Ensure public images
        run: |
          # If images exist in personal-blog/public, copy them into root public so Next export includes them
          if [ -d personal-blog/public/images ]; then
            mkdir -p public/images
            cp -r personal-blog/public/images/* public/images/ || true
            echo "Copied personal-blog images to root public/images"
          else
            echo "No personal-blog/public/images found"
          fi

      - name: Install & build (repo root)
        run: |
          echo "Now in: $(pwd)";
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
