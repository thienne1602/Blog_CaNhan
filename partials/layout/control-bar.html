<div class="control-bar" aria-label="Điều khiển trình chiếu">
  <div class="controls">
    <button
      class="ctrl"
      id="prevBtn"
      data-i18n-aria="prev"
      aria-label="Slide trước"
    >
      <span class="material-symbols-outlined">chevron_left</span>
    </button>
    <button
      class="ctrl"
      id="nextBtn"
      data-i18n-aria="next"
      aria-label="Slide sau"
    >
      <span class="material-symbols-outlined">chevron_right</span>
    </button>
  </div>
</div>
